services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Ensure the Flask CLI (flask db upgrade) can find the app on startup.
      FLASK_APP: wsgi.py
    depends_on:
      db:
        condition: service_healthy
    # Migrations auto-run on startup (see Dockerfile CMD), then gunicorn boots.

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance_password}
      POSTGRES_DB: ${POSTGRES_DB:-finance_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance_user} -d ${POSTGRES_DB:-finance_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
